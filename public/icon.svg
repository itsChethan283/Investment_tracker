<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Background -->
  <rect width="512" height="512" rx="112" fill="#121212"/>
  <!-- Chart bars -->
  <rect x="80"  y="320" width="72" height="112" rx="10" fill="#1DB954" opacity="0.5"/>
  <rect x="192" y="240" width="72" height="192" rx="10" fill="#1DB954" opacity="0.75"/>
  <rect x="304" y="160" width="72" height="272" rx="10" fill="#1DB954"/>
  <!-- Trend line -->
  <polyline
    points="116,300 228,220 340,140 420,100"
    fill="none"
    stroke="#1DB954"
    stroke-width="18"
    stroke-linecap="round"
    stroke-linejoin="round"
  />
  <!-- Dot on trend line end -->
  <circle cx="420" cy="100" r="22" fill="#1DB954"/>
</svg>
